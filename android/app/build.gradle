plugins {
    id "com.android.application"
    id "kotlin-android"  // 注意: без "org.jetbrains." здесь
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "dev.andre.fitassistent"
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId "dev.andre.fitassistent"
        minSdk 28
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

// Если других зависимостей нет — этот блок можно убрать
dependencies {
    // kotlin-stdlib сюда добавлять не нужно — его подтягивают плагины
}